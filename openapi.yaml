          $ref: '#/components/schemas/DrawingScene'
    DrawingPointerState:
      type: object
      additionalProperties: false
      required: [entryId, workspaceId, editor, x, y, updatedAt]
      properties:
        entryId:
          type: string
        workspaceId:
