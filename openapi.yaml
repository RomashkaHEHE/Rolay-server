        status:
          type: string
          enum: [applied, conflict, rejected]
        eventSeq:
          type: integer
          minimum: 0
        reason:
          type: string
        entry:
          $ref: '#/components/schemas/FileEntry'
        serverEntry:
          $ref: '#/components/schemas/FileEntry'
        suggestedPath:
          type: string
    CrdtTokenResponse:
      type: object
