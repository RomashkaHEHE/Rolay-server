openapi: 3.1.0
info:
  title: Rolay Server API
  version: 0.2.0
  description: >
    HTTP contract for Rolay v1. The product model is room-based:
    users have global roles, rooms have owner/member roles, and room trees
    sync through snapshot + SSE + CRDT document sessions.
servers:
  - url: https://rolay.example.com
    description: Production
  - url: http://localhost:3000
    description: Local development
tags:
  - name: auth
  - name: admin
  - name: settings
  - name: rooms
  - name: tree
  - name: files
paths:
  /v1/auth/login:
    post:
      tags: [auth]
      summary: Login
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '401':
          $ref: '#/components/responses/ErrorUnauthorized'
  /v1/auth/refresh:
    post:
      tags: [auth]
      summary: Refresh session tokens
      operationId: refreshSession
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
      responses:
        '200':
          description: Refresh success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RefreshResponse'
        '401':
          $ref: '#/components/responses/ErrorUnauthorized'
  /v1/auth/me:
    get:
      tags: [auth]
      summary: Get current authenticated user
      operationId: getCurrentUser
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Current authenticated user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '401':
          $ref: '#/components/responses/ErrorUnauthorized'
  /v1/auth/me/profile:
    patch:
      tags: [auth]
      summary: Update current user profile
      operationId: updateCurrentUserProfile
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProfileRequest'
      responses:
        '200':
          description: Updated profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '401':
          $ref: '#/components/responses/ErrorUnauthorized'
  /v1/auth/me/password:
    patch:
      tags: [auth]
      summary: Change current user password
      operationId: changeCurrentUserPassword
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangePasswordRequest'
      responses:
        '200':
          description: Password changed and current session rotated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '400':
          description: Invalid password change request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          $ref: '#/components/responses/ErrorUnauthorized'
  /v1/events/settings:
    get:
      tags: [settings]
      summary: Subscribe to settings and admin management events
      operationId: streamSettingsEvents
      security:
        - bearerAuth: []
      parameters:
        - name: cursor
          in: query
          required: false
          schema:
            type: integer
            minimum: 0
          description: >
            Resume settings events after this cursor. When omitted, the stream starts
            live-only and first emits a synthetic `stream.ready` event carrying the
            current cursor.
      responses:
        '200':
          description: Server-sent event stream
          content:
            text/event-stream:
              schema:
                type: string
                example: |
                  id: 42
                  event: room.updated
                  data: {"eventId":42,"type":"room.updated","occurredAt":"2026-04-06T12:00:00.000Z","scope":"rooms","payload":{"room":{"workspace":{"id":"ws_01","name":"Math"},"membershipRole":"owner","createdAt":"2026-04-06T11:00:00.000Z","memberCount":3,"inviteEnabled":true}}}
        '401':
          $ref: '#/components/responses/ErrorUnauthorized'
  /v1/admin/users:
    get:
      tags: [admin]
      summary: List all users
      operationId: listUsers
      security:
        - bearerAuth: []
      responses:
        '200':
          description: User list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserListResponse'
        '401':
          $ref: '#/components/responses/ErrorUnauthorized'
        '403':
          $ref: '#/components/responses/ErrorForbidden'
    post:
      tags: [admin]
      summary: Create managed user account
      operationId: createManagedUser
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateManagedUserRequest'
      responses:
        '201':
          description: User account created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '401':
          $ref: '#/components/responses/ErrorUnauthorized'
        '403':
          $ref: '#/components/responses/ErrorForbidden'
        '409':
          $ref: '#/components/responses/ErrorConflict'
  /v1/admin/users/{userId}:
    delete:
      tags: [admin]
      summary: Delete managed user
      operationId: deleteManagedUser
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/UserId'
      responses:
        '200':
          description: Deleted user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ManagedUserResponse'
        '401':
          $ref: '#/components/responses/ErrorUnauthorized'
        '403':
          $ref: '#/components/responses/ErrorForbidden'
        '404':
          $ref: '#/components/responses/ErrorNotFound'
  /v1/admin/workspaces:
    get:
      tags: [admin]
      summary: List all rooms
      operationId: listAllRooms
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Room list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminRoomListResponse'
        '401':
          $ref: '#/components/responses/ErrorUnauthorized'
        '403':
          $ref: '#/components/responses/ErrorForbidden'
  /v1/admin/workspaces/{workspaceId}/members:
    get:
      tags: [admin]
      summary: List room members
      operationId: listRoomMembersAsAdmin
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/WorkspaceId'
      responses:
        '200':
          description: Room members
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoomMemberListResponse'
        '401':
          $ref: '#/components/responses/ErrorUnauthorized'
        '403':
          $ref: '#/components/responses/ErrorForbidden'
        '404':
          $ref: '#/components/responses/ErrorNotFound'
    post:
      tags: [admin]
      summary: Add user to room by username
      operationId: addRoomMemberAsAdmin
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/WorkspaceId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddRoomMemberRequest'
      responses:
        '200':
          description: Member added or updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AddRoomMemberResponse'
        '401':
          $ref: '#/components/responses/ErrorUnauthorized'
        '403':
          $ref: '#/components/responses/ErrorForbidden'
        '404':
          $ref: '#/components/responses/ErrorNotFound'
  /v1/admin/workspaces/{workspaceId}:
    delete:
      tags: [admin]
      summary: Delete room
      operationId: deleteRoomAsAdmin
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/WorkspaceId'
      responses:
        '200':
          description: Room deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkspaceResponse'
        '401':
          $ref: '#/components/responses/ErrorUnauthorized'
        '403':
          $ref: '#/components/responses/ErrorForbidden'
        '404':
          $ref: '#/components/responses/ErrorNotFound'
  /v1/rooms:
    get:
      tags: [rooms]
      summary: List rooms for current user
      operationId: listRooms
      security:
        - bearerAuth: []
      responses:
        '200':
          description: User room list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoomListResponse'
        '401':
          $ref: '#/components/responses/ErrorUnauthorized'
    post:
      tags: [rooms]
      summary: Create room
      operationId: createRoom
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateRoomRequest'
      responses:
        '201':
          description: Room created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkspaceResponse'
        '401':
          $ref: '#/components/responses/ErrorUnauthorized'
        '403':
          $ref: '#/components/responses/ErrorForbidden'
  /v1/workspaces:
    get:
      tags: [rooms]
      summary: List rooms for current user (workspace alias)
      operationId: listWorkspaces
      security:
        - bearerAuth: []
      responses:
        '200':
          description: User room list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoomListResponse'
        '401':
          $ref: '#/components/responses/ErrorUnauthorized'
    post:
      tags: [rooms]
      summary: Create room (workspace alias)
      operationId: createWorkspace
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateRoomRequest'
      responses:
        '201':
          description: Room created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkspaceResponse'
        '401':
          $ref: '#/components/responses/ErrorUnauthorized'
        '403':
          $ref: '#/components/responses/ErrorForbidden'
  /v1/rooms/join:
    post:
      tags: [rooms]
      summary: Join room by invite key
      operationId: joinRoom
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/JoinRoomRequest'
      responses:
        '200':
          description: Joined room
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkspaceResponse'
        '401':
          $ref: '#/components/responses/ErrorUnauthorized'
        '403':
          $ref: '#/components/responses/ErrorForbidden'
        '404':
          $ref: '#/components/responses/ErrorNotFound'
  /v1/invites/accept:
    post:
      tags: [rooms]
      summary: Join room by invite key (legacy alias)
      operationId: acceptInvite
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/JoinRoomRequest'
      responses:
        '200':
          description: Joined room
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkspaceResponse'
        '401':
          $ref: '#/components/responses/ErrorUnauthorized'
        '403':
          $ref: '#/components/responses/ErrorForbidden'
        '404':
          $ref: '#/components/responses/ErrorNotFound'
  /v1/rooms/{workspaceId}/invite:
    get:
      tags: [rooms]
      summary: Get current room invite state
      operationId: getRoomInvite
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/WorkspaceId'
      responses:
        '200':
          description: Invite state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InviteStateResponse'
        '401':
          $ref: '#/components/responses/ErrorUnauthorized'
        '403':
          $ref: '#/components/responses/ErrorForbidden'
        '404':
          $ref: '#/components/responses/ErrorNotFound'
    patch:
      tags: [rooms]
      summary: Enable or disable room invite key
      operationId: updateRoomInviteState
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/WorkspaceId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateInviteStateRequest'
      responses:
        '200':
          description: Updated invite state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InviteStateResponse'
        '401':
          $ref: '#/components/responses/ErrorUnauthorized'
        '403':
          $ref: '#/components/responses/ErrorForbidden'
        '404':
          $ref: '#/components/responses/ErrorNotFound'
  /v1/workspaces/{workspaceId}/invite:
    get:
      tags: [rooms]
      summary: Get current room invite state (workspace alias)
      operationId: getWorkspaceInvite
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/WorkspaceId'
      responses:
        '200':
          description: Invite state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InviteStateResponse'
        '401':
          $ref: '#/components/responses/ErrorUnauthorized'
        '403':
          $ref: '#/components/responses/ErrorForbidden'
        '404':
          $ref: '#/components/responses/ErrorNotFound'
    patch:
      tags: [rooms]
      summary: Enable or disable room invite key (workspace alias)
      operationId: updateWorkspaceInviteState
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/WorkspaceId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateInviteStateRequest'
      responses:
        '200':
          description: Updated invite state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InviteStateResponse'
        '401':
          $ref: '#/components/responses/ErrorUnauthorized'
        '403':
          $ref: '#/components/responses/ErrorForbidden'
        '404':
          $ref: '#/components/responses/ErrorNotFound'
  /v1/rooms/{workspaceId}/invite/regenerate:
    post:
      tags: [rooms]
      summary: Regenerate room invite key
      operationId: regenerateRoomInvite
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/WorkspaceId'
      responses:
        '200':
          description: Regenerated invite state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InviteStateResponse'
        '401':
          $ref: '#/components/responses/ErrorUnauthorized'
        '403':
          $ref: '#/components/responses/ErrorForbidden'
        '404':
          $ref: '#/components/responses/ErrorNotFound'
  /v1/workspaces/{workspaceId}/invite/regenerate:
    post:
      tags: [rooms]
      summary: Regenerate room invite key (workspace alias)
      operationId: regenerateWorkspaceInvite
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/WorkspaceId'
      responses:
        '200':
          description: Regenerated invite state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InviteStateResponse'
        '401':
          $ref: '#/components/responses/ErrorUnauthorized'
        '403':
          $ref: '#/components/responses/ErrorForbidden'
        '404':
          $ref: '#/components/responses/ErrorNotFound'
  /v1/workspaces/{workspaceId}/tree:
    get:
      tags: [tree]
      summary: Get room tree snapshot
      operationId: getWorkspaceTree
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/WorkspaceId'
      responses:
        '200':
          description: Tree snapshot
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TreeSnapshotResponse'
        '401':
          $ref: '#/components/responses/ErrorUnauthorized'
        '403':
          $ref: '#/components/responses/ErrorForbidden'
        '404':
          $ref: '#/components/responses/ErrorNotFound'
  /v1/workspaces/{workspaceId}/ops/batch:
    post:
      tags: [tree]
      summary: Apply file tree operations
      operationId: applyTreeOperations
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/WorkspaceId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BatchOperationsRequest'
      responses:
        '200':
          description: Operation results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BatchOperationsResponse'
        '401':
          $ref: '#/components/responses/ErrorUnauthorized'
        '403':
          $ref: '#/components/responses/ErrorForbidden'
        '404':
          $ref: '#/components/responses/ErrorNotFound'
        '409':
          description: At least one operation conflicted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BatchOperationsResponse'
  /v1/workspaces/{workspaceId}/events:
    get:
      tags: [tree]
      summary: Subscribe to room events
      operationId: streamWorkspaceEvents
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/WorkspaceId'
        - name: cursor
          in: query
          required: false
          schema:
            type: integer
            minimum: 0
          description: Resume event stream from the next sequence after this cursor.
      responses:
        '200':
          description: Server-sent event stream
          content:
            text/event-stream:
              schema:
                type: string
                example: |
                  id: 185
                  event: tree.entry.updated
                  data: {"entryId":"fil_01","path":"Algebra/Week-01.md","entryVersion":6}
        '401':
          $ref: '#/components/responses/ErrorUnauthorized'
        '403':
          $ref: '#/components/responses/ErrorForbidden'
        '404':
          $ref: '#/components/responses/ErrorNotFound'
  /v1/workspaces/{workspaceId}/markdown/bootstrap:
    post:
      tags: [files]
      summary: Bootstrap stored Yjs state for markdown files in a room
      operationId: bootstrapMarkdownDocuments
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/WorkspaceId'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MarkdownBootstrapRequest'
      responses:
        '200':
          description: Current stored Yjs state for requested markdown files
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MarkdownBootstrapResponse'
        '401':
          $ref: '#/components/responses/ErrorUnauthorized'
        '403':
          $ref: '#/components/responses/ErrorForbidden'
        '404':
          $ref: '#/components/responses/ErrorNotFound'
  /v1/files/{entryId}/crdt-token:
    post:
      tags: [files]
      summary: Create short-lived CRDT token for markdown file
      operationId: createCrdtToken
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/EntryId'
      responses:
        '200':
          description: CRDT session bootstrap
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CrdtTokenResponse'
        '401':
          $ref: '#/components/responses/ErrorUnauthorized'
        '403':
          $ref: '#/components/responses/ErrorForbidden'
        '404':
          $ref: '#/components/responses/ErrorNotFound'
  /v1/files/{entryId}/blob/upload-ticket:
    post:
      tags: [files]
      summary: Create upload ticket for binary file revision
      operationId: createBlobUploadTicket
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/EntryId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BlobUploadTicketRequest'
      responses:
        '200':
          description: Upload ticket
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BlobUploadTicketResponse'
        '401':
          $ref: '#/components/responses/ErrorUnauthorized'
        '403':
          $ref: '#/components/responses/ErrorForbidden'
        '404':
          $ref: '#/components/responses/ErrorNotFound'
  /v1/files/{entryId}/blob/download-ticket:
    post:
      tags: [files]
      summary: Create download ticket for current binary file revision
      operationId: createBlobDownloadTicket
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/EntryId'
      responses:
        '200':
          description: Download ticket
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BlobDownloadTicketResponse'
        '401':
          $ref: '#/components/responses/ErrorUnauthorized'
        '403':
          $ref: '#/components/responses/ErrorForbidden'
        '404':
          $ref: '#/components/responses/ErrorNotFound'
  /v1/files/{entryId}/blob/uploads/{uploadId}:
    delete:
      tags: [files]
      summary: Cancel pending or active binary blob upload
      operationId: cancelBlobUpload
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/EntryId'
        - name: uploadId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Upload canceled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CancelBlobUploadResponse'
        '401':
          $ref: '#/components/responses/ErrorUnauthorized'
        '403':
          $ref: '#/components/responses/ErrorForbidden'
        '404':
          $ref: '#/components/responses/ErrorNotFound'
  /v1/files/{entryId}/blob/uploads/{uploadId}/content:
    put:
      tags: [files]
      summary: Upload binary blob bytes through the authenticated API
      operationId: uploadBlobContent
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/EntryId'
        - name: uploadId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/octet-stream:
            schema:
              type: string
              format: binary
      responses:
        '200':
          description: Blob bytes uploaded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BlobUploadContentResponse'
        '400':
          $ref: '#/components/responses/ErrorBadRequest'
        '401':
          $ref: '#/components/responses/ErrorUnauthorized'
        '403':
          $ref: '#/components/responses/ErrorForbidden'
        '404':
          $ref: '#/components/responses/ErrorNotFound'
  components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: opaque
  parameters:
    WorkspaceId:
      name: workspaceId
      in: path
      required: true
      schema:
        type: string
      description: Room identifier.
    UserId:
      name: userId
      in: path
      required: true
      schema:
        type: string
      description: Managed user identifier.
    EntryId:
      name: entryId
      in: path
      required: true
      schema:
        type: string
      description: Stable file entry identifier.
  responses:
    ErrorUnauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    ErrorForbidden:
      description: Forbidden
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    ErrorNotFound:
      description: Not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    ErrorConflict:
      description: Conflict
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
  schemas:
    LoginRequest:
      type: object
      additionalProperties: false
      required: [username, password, deviceName]
      properties:
        username:
          type: string
        password:
          type: string
          format: password
        deviceName:
          type: string
    LoginResponse:
      type: object
      additionalProperties: false
      required: [accessToken, refreshToken, user]
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
        user:
          $ref: '#/components/schemas/User'
    RefreshRequest:
      type: object
      additionalProperties: false
      required: [refreshToken]
      properties:
        refreshToken:
          type: string
    RefreshResponse:
      type: object
      additionalProperties: false
      required: [accessToken, refreshToken]
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
    UpdateProfileRequest:
      type: object
      additionalProperties: false
      required: [displayName]
      properties:
        displayName:
          type: string
    ChangePasswordRequest:
      type: object
      additionalProperties: false
      required: [currentPassword, newPassword]
      properties:
        currentPassword:
          type: string
          format: password
        newPassword:
          type: string
          format: password
    SettingsEvent:
      type: object
      additionalProperties: false
      required: [eventId, type, occurredAt, scope, payload]
      properties:
        eventId:
          type: integer
          minimum: 0
        type:
          type: string
          examples:
            - stream.ready
            - auth.me.updated
            - room.created
            - room.updated
            - room.deleted
            - room.membership.changed
            - room.invite.updated
            - admin.user.created
            - admin.user.updated
            - admin.user.deleted
            - admin.room.members.updated
        occurredAt:
          type: string
          format: date-time
        scope:
          type: string
          enum:
            - settings.stream
            - auth.me
            - rooms
            - room.invite
            - admin.users
            - admin.rooms
            - admin.room.members
        payload:
          type: object
          additionalProperties: true
    CreateManagedUserRequest:
      type: object
      additionalProperties: false
      required: [username, password]
      properties:
        username:
          type: string
        password:
          type: string
          format: password
        displayName:
          type: string
        globalRole:
          $ref: '#/components/schemas/ManagedGlobalRole'
    GlobalRole:
      type: string
      enum: [admin, writer, reader]
    ManagedGlobalRole:
      type: string
      enum: [writer, reader]
    WorkspaceRole:
      type: string
      enum: [owner, member]
    User:
      type: object
      additionalProperties: false
      required: [id, username, displayName, isAdmin, globalRole]
      properties:
        id:
          type: string
        username:
          type: string
        displayName:
          type: string
        isAdmin:
          type: boolean
        globalRole:
          $ref: '#/components/schemas/GlobalRole'
    ManagedUser:
      allOf:
        - $ref: '#/components/schemas/User'
        - type: object
          additionalProperties: false
          properties:
            createdAt:
              type: string
              format: date-time
            disabledAt:
              type: string
              format: date-time
    UserResponse:
      type: object
      additionalProperties: false
      required: [user]
      properties:
        user:
          $ref: '#/components/schemas/User'
    ManagedUserResponse:
      type: object
      additionalProperties: false
      required: [user]
      properties:
        user:
          $ref: '#/components/schemas/ManagedUser'
    UserListResponse:
      type: object
      additionalProperties: false
      required: [users]
      properties:
        users:
          type: array
          items:
            $ref: '#/components/schemas/ManagedUser'
    Workspace:
      type: object
      additionalProperties: false
      required: [id, name]
      properties:
        id:
          type: string
        name:
          type: string
    WorkspaceResponse:
      type: object
      additionalProperties: false
      required: [workspace]
      properties:
        workspace:
          $ref: '#/components/schemas/Workspace'
    CreateRoomRequest:
      type: object
      additionalProperties: false
      required: [name]
      properties:
        name:
          type: string
          minLength: 1
        slug:
          type: string
          deprecated: true
    RoomListItem:
      type: object
      additionalProperties: false
      required: [workspace, membershipRole, createdAt, memberCount, inviteEnabled]
      properties:
        workspace:
          $ref: '#/components/schemas/Workspace'
        membershipRole:
          $ref: '#/components/schemas/WorkspaceRole'
        createdAt:
          type: string
          format: date-time
        memberCount:
          type: integer
          minimum: 0
        inviteEnabled:
          type: boolean
    AdminRoomListItem:
      allOf:
        - $ref: '#/components/schemas/RoomListItem'
        - type: object
          additionalProperties: false
          required: [ownerCount]
          properties:
            ownerCount:
              type: integer
              minimum: 0
    RoomListResponse:
      type: object
      additionalProperties: false
      required: [workspaces]
      properties:
        workspaces:
          type: array
          items:
            $ref: '#/components/schemas/RoomListItem'
    AdminRoomListResponse:
      type: object
      additionalProperties: false
      required: [workspaces]
      properties:
        workspaces:
          type: array
          items:
            $ref: '#/components/schemas/AdminRoomListItem'
    JoinRoomRequest:
      type: object
      additionalProperties: false
      required: [code]
      properties:
        code:
          type: string
    InviteState:
      type: object
      additionalProperties: false
      required: [workspaceId, code, enabled, updatedAt]
      properties:
        workspaceId:
          type: string
        code:
          type: string
        enabled:
          type: boolean
        updatedAt:
          type: string
          format: date-time
    InviteStateResponse:
      type: object
      additionalProperties: false
      required: [invite]
      properties:
        invite:
          $ref: '#/components/schemas/InviteState'
    UpdateInviteStateRequest:
      type: object
      additionalProperties: false
      required: [enabled]
      properties:
        enabled:
          type: boolean
    RoomMember:
      type: object
      additionalProperties: false
      required: [user, role, joinedAt]
      properties:
        user:
          $ref: '#/components/schemas/User'
        role:
          $ref: '#/components/schemas/WorkspaceRole'
        joinedAt:
          type: string
          format: date-time
    RoomMemberListResponse:
      type: object
      additionalProperties: false
      required: [members]
      properties:
        members:
          type: array
          items:
            $ref: '#/components/schemas/RoomMember'
    Membership:
      type: object
      additionalProperties: false
      required: [userId, role, joinedAt]
      properties:
        userId:
          type: string
        role:
          $ref: '#/components/schemas/WorkspaceRole'
        joinedAt:
          type: string
          format: date-time
    AddRoomMemberRequest:
      type: object
      additionalProperties: false
      required: [username]
      properties:
        username:
          type: string
        role:
          $ref: '#/components/schemas/WorkspaceRole'
    AddRoomMemberResponse:
      type: object
      additionalProperties: false
      required: [workspace, user, membership]
      properties:
        workspace:
          $ref: '#/components/schemas/Workspace'
        user:
          $ref: '#/components/schemas/User'
        membership:
          $ref: '#/components/schemas/Membership'
    TreeSnapshotResponse:
      type: object
      additionalProperties: false
      required: [workspace, cursor, entries]
      properties:
        workspace:
          $ref: '#/components/schemas/Workspace'
        cursor:
          type: integer
          minimum: 0
        entries:
          type: array
          items:
            $ref: '#/components/schemas/FileEntry'
    FileEntry:
      type: object
      additionalProperties: false
      required:
        - id
        - path
        - kind
        - contentMode
        - entryVersion
        - deleted
        - updatedAt
      properties:
        id:
          type: string
        path:
          type: string
        kind:
          type: string
          enum: [folder, markdown, binary]
        contentMode:
          type: string
          enum: [none, crdt, blob]
        entryVersion:
          type: integer
          minimum: 0
        docId:
          type: string
        mimeType:
          type: string
        blob:
          $ref: '#/components/schemas/BlobRevision'
        deleted:
          type: boolean
        updatedAt:
          type: string
          format: date-time
    BlobRevision:
      type: object
      additionalProperties: false
      required: [hash, sizeBytes, mimeType]
      properties:
        hash:
          type: string
        sizeBytes:
          type: integer
          minimum: 0
        mimeType:
          type: string
    BatchOperationsRequest:
      type: object
      additionalProperties: false
      required: [deviceId, operations]
      properties:
        deviceId:
          type: string
        operations:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/TreeOperation'
    TreeOperation:
      type: object
      additionalProperties: false
      required: [opId, type]
      properties:
        opId:
          type: string
        type:
          type: string
          enum:
            - create_folder
            - create_markdown
            - create_binary_placeholder
            - rename_entry
            - move_entry
            - delete_entry
            - restore_entry
            - commit_blob_revision
        path:
          type: string
        entryId:
          type: string
        newPath:
          type: string
        hash:
          type: string
        sizeBytes:
          type: integer
          minimum: 0
        mimeType:
          type: string
        preconditions:
          $ref: '#/components/schemas/OperationPreconditions'
    OperationPreconditions:
      type: object
      additionalProperties: false
      properties:
        entryVersion:
          type: integer
          minimum: 0
        path:
          type: string
    BatchOperationsResponse:
      type: object
      additionalProperties: false
      required: [results]
      properties:
        results:
          type: array
          items:
            $ref: '#/components/schemas/OperationResult'
    OperationResult:
      type: object
      additionalProperties: false
      required: [opId, status]
      properties:
        opId:
          type: string
        status:
          type: string
          enum: [applied, conflict, rejected]
        eventSeq:
          type: integer
          minimum: 0
        reason:
          type: string
        entry:
          $ref: '#/components/schemas/FileEntry'
        serverEntry:
          $ref: '#/components/schemas/FileEntry'
        suggestedPath:
          type: string
    CrdtTokenResponse:
      type: object
      additionalProperties: false
      required: [entryId, docId, provider, wsUrl, token, expiresAt]
      properties:
        entryId:
          type: string
        docId:
          type: string
        provider:
          type: string
          example: yjs-hocuspocus
        wsUrl:
          type: string
          format: uri
        token:
          type: string
        expiresAt:
          type: string
          format: date-time
    MarkdownBootstrapRequest:
      type: object
      additionalProperties: false
      properties:
        entryIds:
          type: array
          items:
            type: string
          description: >
            Optional list of markdown entry IDs to bootstrap. When omitted,
            the server returns all active markdown entries in the room.
        includeState:
          type: boolean
          default: true
          description: >
            When false, the server returns only per-document size metadata
            and omits the base64-encoded state payloads.
    MarkdownBootstrapDocument:
      type: object
      additionalProperties: false
      required: [entryId, docId, stateBytes, encodedBytes]
      properties:
        entryId:
          type: string
        docId:
          type: string
        stateBytes:
          type: integer
          minimum: 0
          description: Byte size of the raw Yjs state update.
        encodedBytes:
          type: integer
          minimum: 0
          description: Byte size of the base64-encoded state payload.
        state:
          type: string
          description: Base64-encoded full Yjs state update for the document.
    MarkdownBootstrapResponse:
      type: object
      additionalProperties: false
      required:
        - workspaceId
        - encoding
        - includesState
        - documentCount
        - totalStateBytes
        - totalEncodedBytes
        - documents
      properties:
        workspaceId:
          type: string
        encoding:
          type: string
          enum: [base64]
        includesState:
          type: boolean
        documentCount:
          type: integer
          minimum: 0
        totalStateBytes:
          type: integer
          minimum: 0
        totalEncodedBytes:
          type: integer
          minimum: 0
        documents:
          type: array
          items:
            $ref: '#/components/schemas/MarkdownBootstrapDocument'
    BlobUploadTicketRequest:
      type: object
      additionalProperties: false
      required: [hash, sizeBytes, mimeType]
      properties:
        hash:
          type: string
        sizeBytes:
          type: integer
          minimum: 0
        mimeType:
          type: string
    BlobUploadTicketResponse:
      type: object
      additionalProperties: false
      required: [alreadyExists]
      properties:
        alreadyExists:
          type: boolean
        uploadId:
          type: string
        hash:
          type: string
        sizeBytes:
          type: integer
          minimum: 0
        mimeType:
          type: string
        expiresAt:
          type: string
          format: date-time
        upload:
          $ref: '#/components/schemas/UploadTarget'
        cancel:
          $ref: '#/components/schemas/DeleteTarget'
    UploadTarget:
      type: object
      additionalProperties: false
      required: [method, url, headers]
      properties:
        method:
          type: string
          enum: [PUT, POST]
        url:
          type: string
          format: uri
        headers:
          type: object
          additionalProperties:
            type: string
    DeleteTarget:
      type: object
      additionalProperties: false
      required: [method, url]
      properties:
        method:
          type: string
          enum: [DELETE]
        url:
          type: string
          format: uri
    BlobDownloadTicketResponse:
      type: object
      additionalProperties: false
      required: [hash, sizeBytes, mimeType, url]
      properties:
        hash:
          type: string
        sizeBytes:
          type: integer
          minimum: 0
        mimeType:
          type: string
        url:
          type: string
          format: uri
    CancelBlobUploadResponse:
      type: object
      additionalProperties: false
      required: [ok, uploadId, wasActive]
      properties:
        ok:
          type: boolean
        uploadId:
          type: string
        wasActive:
          type: boolean
    BlobUploadContentResponse:
      type: object
      additionalProperties: false
      required: [ok, hash, sizeBytes]
      properties:
        ok:
          type: boolean
        hash:
          type: string
        sizeBytes:
          type: integer
          minimum: 0
    ErrorResponse:
      type: object
      additionalProperties: false
      required: [error]
      properties:
        error:
          $ref: '#/components/schemas/ErrorObject'
    ErrorObject:
      type: object
      additionalProperties: false
      required: [code, message]
      properties:
        code:
          type: string
          examples:
            - unauthorized
            - forbidden
            - workspace_not_found
            - invite_not_found
            - invite_disabled
            - user_not_found
            - entry_not_found
            - path_already_exists
            - entry_version_mismatch
            - username_taken
            - invalid_role
            - cannot_delete_admin_user
        message:
          type: string
        details:
          type: object
          additionalProperties: true
