            - create_folder
            - create_markdown
            - create_excalidraw
            - create_binary_placeholder
            - rename_entry
            - move_entry
            - delete_entry
            - restore_entry
            - commit_blob_revision
        path:
          type: string
        entryId:
          type: string
        newPath:
          type: string
        hash:
          type: string
        sizeBytes:
          type: integer
          minimum: 0
        mimeType:
          type: string
        preconditions:
          $ref: '#/components/schemas/OperationPreconditions'
    OperationPreconditions:
      type: object
      additionalProperties: false
      properties:
        entryVersion:
          type: integer
          minimum: 0
        path:
