      properties:
        userId:
          type: string
        deviceId:
          type: string
        username:
          type: string
        displayName:
          type: string
    DrawingLease:
      type: object
      additionalProperties: false
      required: [entryId, workspaceId, editor, acquiredAt, expiresAt]
      properties:
        entryId:
          type: string
        workspaceId:
          type: string
