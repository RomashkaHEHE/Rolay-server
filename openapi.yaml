          type: object
          additionalProperties: true
        files:
          type: object
          additionalProperties: true
    DrawingSceneSnapshot:
      type: object
      additionalProperties: false
      required: [entryId, workspaceId, revision, updatedAt, scene]
      properties:
        entryId:
          type: string
        workspaceId:
          type: string
        revision:
          type: integer
          minimum: 0
        updatedAt:
          type: string
          format: date-time
