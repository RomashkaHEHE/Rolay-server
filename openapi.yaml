openapi: 3.1.0
info:
  title: Rolay Server API
  version: 0.3.0
  description: >
    HTTP contract for Rolay v1. The product model is room-based:
    users have global roles, rooms have owner/member roles, and room trees
    sync through snapshot + SSE + CRDT document sessions. Excalidraw drawings
    use blob-backed persistence plus single-editor live sessions.
servers:
  - url: https://rolay.example.com
    description: Production
  - url: http://localhost:3000
    description: Local development
tags:
  - name: auth
  - name: admin
  - name: settings
  - name: rooms
  - name: presence
  - name: tree
  - name: files
  - name: drawings
  - name: public
paths:
  /v1/auth/login:
    post:
      tags: [auth]
      summary: Login
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '401':
          $ref: '#/components/responses/ErrorUnauthorized'
  /v1/auth/refresh:
    post:
      tags: [auth]
      summary: Refresh session tokens
      operationId: refreshSession
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
      responses:
        '200':
          description: Refresh success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RefreshResponse'
        '401':
          $ref: '#/components/responses/ErrorUnauthorized'
  /v1/auth/me:
    get:
      tags: [auth]
      summary: Get current authenticated user
      operationId: getCurrentUser
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Current authenticated user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '401':
          $ref: '#/components/responses/ErrorUnauthorized'
  /v1/auth/me/profile:
    patch:
      tags: [auth]
      summary: Update current user profile
      operationId: updateCurrentUserProfile
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProfileRequest'
      responses:
        '200':
          description: Updated profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '401':
          $ref: '#/components/responses/ErrorUnauthorized'
  /v1/auth/me/password:
    patch:
      tags: [auth]
      summary: Change current user password
      operationId: changeCurrentUserPassword
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangePasswordRequest'
      responses:
        '200':
          description: Password changed and current session rotated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '400':
          description: Invalid password change request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          $ref: '#/components/responses/ErrorUnauthorized'
  /v1/events/settings:
    get:
      tags: [settings]
      summary: Subscribe to settings and admin management events
      operationId: streamSettingsEvents
      security:
        - bearerAuth: []
      parameters:
        - name: cursor
          in: query
          required: false
          schema:
            type: integer
            minimum: 0
          description: >
            Resume settings events after this cursor. When omitted, the stream starts
            live-only and first emits a synthetic `stream.ready` event carrying the
            current cursor.
      responses:
        '200':
          description: Server-sent event stream
          content:
            text/event-stream:
              schema:
                type: string
                example: |
                  id: 42
                  event: room.updated
                  data: {"eventId":42,"type":"room.updated","occurredAt":"2026-04-06T12:00:00.000Z","scope":"rooms","payload":{"room":{"workspace":{"id":"ws_01","name":"Math"},"membershipRole":"owner","createdAt":"2026-04-06T11:00:00.000Z","memberCount":3,"inviteEnabled":true}}}
        '401':
          $ref: '#/components/responses/ErrorUnauthorized'
  /v1/admin/users:
    get:
      tags: [admin]
      summary: List all users
      operationId: listUsers
      security:
        - bearerAuth: []
      responses:
        '200':
          description: User list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserListResponse'
        '401':
          $ref: '#/components/responses/ErrorUnauthorized'
        '403':
          $ref: '#/components/responses/ErrorForbidden'
    post:
      tags: [admin]
      summary: Create managed user account
      operationId: createManagedUser
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateManagedUserRequest'
      responses:
        '201':
          description: User account created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '401':
          $ref: '#/components/responses/ErrorUnauthorized'
        '403':
          $ref: '#/components/responses/ErrorForbidden'
        '409':
          $ref: '#/components/responses/ErrorConflict'
  /v1/admin/users/{userId}:
    delete:
      tags: [admin]
      summary: Delete managed user
      operationId: deleteManagedUser
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/UserId'
      responses:
        '200':
          description: Deleted user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ManagedUserResponse'
        '401':
          $ref: '#/components/responses/ErrorUnauthorized'
        '403':
          $ref: '#/components/responses/ErrorForbidden'
        '404':
          $ref: '#/components/responses/ErrorNotFound'
  /v1/admin/workspaces:
    get:
      tags: [admin]
      summary: List all rooms
      operationId: listAllRooms
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Room list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminRoomListResponse'
        '401':
          $ref: '#/components/responses/ErrorUnauthorized'
        '403':
          $ref: '#/components/responses/ErrorForbidden'
  /v1/admin/workspaces/{workspaceId}/members:
    get:
      tags: [admin]
      summary: List room members
      operationId: listRoomMembersAsAdmin
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/WorkspaceId'
      responses:
        '200':
          description: Room members
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoomMemberListResponse'
        '401':
          $ref: '#/components/responses/ErrorUnauthorized'
        '403':
          $ref: '#/components/responses/ErrorForbidden'
        '404':
          $ref: '#/components/responses/ErrorNotFound'
    post:
      tags: [admin]
      summary: Add user to room by username
      operationId: addRoomMemberAsAdmin
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/WorkspaceId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddRoomMemberRequest'
      responses:
        '200':
          description: Member added or updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AddRoomMemberResponse'
        '401':
          $ref: '#/components/responses/ErrorUnauthorized'
        '403':
          $ref: '#/components/responses/ErrorForbidden'
        '404':
          $ref: '#/components/responses/ErrorNotFound'
  /v1/admin/workspaces/{workspaceId}:
    delete:
      tags: [admin]
      summary: Delete room
      operationId: deleteRoomAsAdmin
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/WorkspaceId'
      responses:
        '200':
          description: Room deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkspaceResponse'
        '401':
          $ref: '#/components/responses/ErrorUnauthorized'
        '403':
          $ref: '#/components/responses/ErrorForbidden'
        '404':
          $ref: '#/components/responses/ErrorNotFound'
  /v1/rooms:
    get:
      tags: [rooms]
      summary: List rooms for current user
      operationId: listRooms
      security:
        - bearerAuth: []
      responses:
        '200':
          description: User room list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoomListResponse'
        '401':
          $ref: '#/components/responses/ErrorUnauthorized'
    post:
      tags: [rooms]
      summary: Create room
      operationId: createRoom
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateRoomRequest'
      responses:
        '201':
          description: Room created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkspaceResponse'
        '401':
          $ref: '#/components/responses/ErrorUnauthorized'
        '403':
          $ref: '#/components/responses/ErrorForbidden'
  /v1/rooms/{workspaceId}/members:
    get:
      tags: [rooms]
      summary: List room members for the current participant
      operationId: listRoomMembers
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/WorkspaceId'
      responses:
        '200':
          description: Room members
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoomMemberListResponse'
        '401':
          $ref: '#/components/responses/ErrorUnauthorized'
        '403':
          $ref: '#/components/responses/ErrorForbidden'
        '404':
          $ref: '#/components/responses/ErrorNotFound'
  /v1/rooms/{workspaceId}/publication:
    get:
      tags: [rooms]
      summary: Get room publication state
      operationId: getRoomPublication
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/WorkspaceId'
      responses:
        '200':
          description: Room publication state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoomPublicationResponse'
        '401':
          $ref: '#/components/responses/ErrorUnauthorized'
        '403':
          $ref: '#/components/responses/ErrorForbidden'
        '404':
          $ref: '#/components/responses/ErrorNotFound'
    patch:
      tags: [rooms]
      summary: Toggle room publication state
      operationId: updateRoomPublication
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/WorkspaceId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateRoomPublicationRequest'
      responses:
        '200':
          description: Updated room publication state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoomPublicationResponse'
        '400':
          $ref: '#/components/responses/ErrorBadRequest'
        '401':
          $ref: '#/components/responses/ErrorUnauthorized'
        '403':
          $ref: '#/components/responses/ErrorForbidden'
        '404':
          $ref: '#/components/responses/ErrorNotFound'
  /v1/workspaces:
    get:
      tags: [rooms]
      summary: List rooms for current user (workspace alias)
      operationId: listWorkspaces
      security:
        - bearerAuth: []
      responses:
        '200':
          description: User room list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoomListResponse'
        '401':
          $ref: '#/components/responses/ErrorUnauthorized'
    post:
      tags: [rooms]
      summary: Create room (workspace alias)
      operationId: createWorkspace
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateRoomRequest'
      responses:
        '201':
          description: Room created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkspaceResponse'
        '401':
          $ref: '#/components/responses/ErrorUnauthorized'
        '403':
          $ref: '#/components/responses/ErrorForbidden'
  /v1/workspaces/{workspaceId}/members:
    get:
      tags: [rooms]
      summary: List room members for the current participant (workspace alias)
      operationId: listWorkspaceMembers
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/WorkspaceId'
      responses:
        '200':
          description: Room members
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoomMemberListResponse'
        '401':
          $ref: '#/components/responses/ErrorUnauthorized'
        '403':
          $ref: '#/components/responses/ErrorForbidden'
        '404':
          $ref: '#/components/responses/ErrorNotFound'
  /v1/workspaces/{workspaceId}/publication:
    get:
      tags: [rooms]
      summary: Get room publication state (workspace alias)
      operationId: getWorkspacePublication
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/WorkspaceId'
      responses:
        '200':
          description: Room publication state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoomPublicationResponse'
        '401':
          $ref: '#/components/responses/ErrorUnauthorized'
        '403':
          $ref: '#/components/responses/ErrorForbidden'
        '404':
          $ref: '#/components/responses/ErrorNotFound'
    patch:
      tags: [rooms]
      summary: Toggle room publication state (workspace alias)
      operationId: updateWorkspacePublication
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/WorkspaceId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateRoomPublicationRequest'
      responses:
        '200':
          description: Updated room publication state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoomPublicationResponse'
        '400':
          $ref: '#/components/responses/ErrorBadRequest'
        '401':
          $ref: '#/components/responses/ErrorUnauthorized'
        '403':
          $ref: '#/components/responses/ErrorForbidden'
        '404':
          $ref: '#/components/responses/ErrorNotFound'
  /public/api/rooms:
    get:
      tags: [public]
      summary: List published rooms
      operationId: listPublicRooms
      responses:
        '200':
          description: Published room list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublicRoomListResponse'
  /public/api/rooms/{workspaceId}/manifest:
    get:
      tags: [public]
      summary: Get public room manifest
      operationId: getPublicRoomManifest
      parameters:
        - $ref: '#/components/parameters/WorkspaceId'
      responses:
        '200':
          description: Public room manifest
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublicRoomManifest'
        '404':
          $ref: '#/components/responses/ErrorNotFound'
  /public/api/rooms/{workspaceId}/events:
    get:
      tags: [public]
      summary: Subscribe to public room events
      operationId: streamPublicRoomEvents
      parameters:
        - $ref: '#/components/parameters/WorkspaceId'
        - name: cursor
          in: query
          required: false
          schema:
            type: integer
            minimum: 0
      responses:
        '200':
          description: Public server-sent event stream
          content:
            text/event-stream:
              schema:
                type: string
                example: |
                  id: 42
                  event: tree.entry.updated
                  data: {"entryId":"fil_1","path":"Week-01.md","entryVersion":3}
        '404':
          $ref: '#/components/responses/ErrorNotFound'
  /public/api/rooms/{workspaceId}/markdown/{entryId}/crdt-token:
    post:
      tags: [public]
      summary: Create a public read-only Markdown CRDT token
      operationId: createPublicMarkdownCrdtToken
      parameters:
        - $ref: '#/components/parameters/WorkspaceId'
        - $ref: '#/components/parameters/EntryId'
      responses:
        '200':
          description: Read-only public CRDT token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublicCrdtTokenResponse'
        '404':
          $ref: '#/components/responses/ErrorNotFound'
  /public/api/rooms/{workspaceId}/files/{entryId}/blob/content:
    get:
      tags: [public]
      summary: Read a public image or Excalidraw blob
      operationId: getPublicBlobContent
      parameters:
        - $ref: '#/components/parameters/WorkspaceId'
        - $ref: '#/components/parameters/EntryId'
        - name: hash
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Full blob content
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        '206':
          description: Partial blob content
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        '404':
          $ref: '#/components/responses/ErrorNotFound'
  /v1/rooms/{workspaceId}/note-presence/events:
    get:
      tags: [presence]
      summary: Subscribe to room note presence updates
      operationId: streamRoomNotePresence
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/WorkspaceId'
      responses:
        '200':
          description: Server-sent event stream
          content:
            text/event-stream:
              schema:
                  type: string
                  example: |
                    event: presence.snapshot
                    data: {"workspaceId":"ws_01","notes":[{"entryId":"fil_01","viewers":[{"presenceId":"presence:ws_01:fil_01:9384702","sessionId":"session:client-abc","userId":"usr_01","displayName":"Roma","color":"#8b5cf6","hasSelection":false}]}]}
                    
                    event: note.presence.updated
                    data: {"workspaceId":"ws_01","entryId":"fil_01","viewers":[{"presenceId":"presence:ws_01:fil_01:9384702","sessionId":"session:client-abc","userId":"usr_01","displayName":"Roma","color":"#8b5cf6","hasSelection":true}]}
        '401':
          $ref: '#/components/responses/ErrorUnauthorized'
        '403':
          $ref: '#/components/responses/ErrorForbidden'
        '404':
          $ref: '#/components/responses/ErrorNotFound'
  /v1/workspaces/{workspaceId}/note-presence/events:
    get:
      tags: [presence]
      summary: Subscribe to room note presence updates (workspace alias)
      operationId: streamWorkspaceNotePresence
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/WorkspaceId'
      responses:
        '200':
          description: Server-sent event stream
          content:
            text/event-stream:
              schema:
                type: string
                example: |
                  event: presence.snapshot
                  data: {"workspaceId":"ws_01","notes":[]}
        '401':
          $ref: '#/components/responses/ErrorUnauthorized'
          '403':
            $ref: '#/components/responses/ErrorForbidden'
          '404':
            $ref: '#/components/responses/ErrorNotFound'
  /v1/rooms/{workspaceId}/note-read-state/events:
    get:
      tags: [presence]
      summary: Subscribe to room markdown read-state updates
      operationId: streamRoomNoteReadState
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/WorkspaceId'
      responses:
        '200':
          description: Server-sent event stream
          content:
            text/event-stream:
              schema:
                type: string
                example: |
                  event: read-state.snapshot
                  data: {"workspaceId":"ws_01","notes":[{"entryId":"fil_01","contentVersion":4,"lastReadContentVersion":2,"unread":true}]}
                  
                  event: note.read-state.updated
                  data: {"workspaceId":"ws_01","entryId":"fil_01","contentVersion":5,"lastReadContentVersion":5,"unread":false}
        '401':
          $ref: '#/components/responses/ErrorUnauthorized'
        '403':
          $ref: '#/components/responses/ErrorForbidden'
        '404':
          $ref: '#/components/responses/ErrorNotFound'
  /v1/workspaces/{workspaceId}/note-read-state/events:
    get:
      tags: [presence]
      summary: Subscribe to room markdown read-state updates (workspace alias)
      operationId: streamWorkspaceNoteReadState
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/WorkspaceId'
      responses:
        '200':
          description: Server-sent event stream
          content:
            text/event-stream:
              schema:
                type: string
                example: |
                  event: read-state.snapshot
                  data: {"workspaceId":"ws_01","notes":[]}
        '401':
          $ref: '#/components/responses/ErrorUnauthorized'
        '403':
          $ref: '#/components/responses/ErrorForbidden'
        '404':
          $ref: '#/components/responses/ErrorNotFound'
  /v1/workspaces/{workspaceId}/notes/{entryId}/read:
    post:
      tags: [presence]
      summary: Mark a markdown note as read for the current account
      operationId: markNoteRead
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/WorkspaceId'
        - $ref: '#/components/parameters/EntryId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MarkNoteReadRequest'
      responses:
        '200':
          description: Updated read state for the caller account
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NoteReadStateUpdate'
        '400':
          $ref: '#/components/responses/ErrorBadRequest'
        '401':
          $ref: '#/components/responses/ErrorUnauthorized'
        '403':
          $ref: '#/components/responses/ErrorForbidden'
        '404':
          $ref: '#/components/responses/ErrorNotFound'
  /v1/rooms/join:
    post:
      tags: [rooms]
      summary: Join room by invite key
      operationId: joinRoom
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/JoinRoomRequest'
      responses:
        '200':
          description: Joined room
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkspaceResponse'
        '401':
          $ref: '#/components/responses/ErrorUnauthorized'
        '403':
          $ref: '#/components/responses/ErrorForbidden'
        '404':
          $ref: '#/components/responses/ErrorNotFound'
  /v1/invites/accept:
    post:
      tags: [rooms]
      summary: Join room by invite key (legacy alias)
      operationId: acceptInvite
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/JoinRoomRequest'
      responses:
        '200':
          description: Joined room
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkspaceResponse'
        '401':
          $ref: '#/components/responses/ErrorUnauthorized'
        '403':
          $ref: '#/components/responses/ErrorForbidden'
        '404':
          $ref: '#/components/responses/ErrorNotFound'
  /v1/rooms/{workspaceId}/invite:
    get:
      tags: [rooms]
      summary: Get current room invite state
      operationId: getRoomInvite
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/WorkspaceId'
      responses:
        '200':
          description: Invite state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InviteStateResponse'
        '401':
          $ref: '#/components/responses/ErrorUnauthorized'
        '403':
          $ref: '#/components/responses/ErrorForbidden'
        '404':
          $ref: '#/components/responses/ErrorNotFound'
    patch:
      tags: [rooms]
      summary: Enable or disable room invite key
      operationId: updateRoomInviteState
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/WorkspaceId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateInviteStateRequest'
      responses:
        '200':
          description: Updated invite state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InviteStateResponse'
        '401':
          $ref: '#/components/responses/ErrorUnauthorized'
        '403':
          $ref: '#/components/responses/ErrorForbidden'
        '404':
          $ref: '#/components/responses/ErrorNotFound'
  /v1/workspaces/{workspaceId}/invite:
    get:
      tags: [rooms]
      summary: Get current room invite state (workspace alias)
      operationId: getWorkspaceInvite
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/WorkspaceId'
      responses:
        '200':
          description: Invite state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InviteStateResponse'
        '401':
          $ref: '#/components/responses/ErrorUnauthorized'
        '403':
          $ref: '#/components/responses/ErrorForbidden'
        '404':
          $ref: '#/components/responses/ErrorNotFound'
    patch:
      tags: [rooms]
      summary: Enable or disable room invite key (workspace alias)
      operationId: updateWorkspaceInviteState
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/WorkspaceId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateInviteStateRequest'
      responses:
        '200':
          description: Updated invite state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InviteStateResponse'
        '401':
          $ref: '#/components/responses/ErrorUnauthorized'
        '403':
          $ref: '#/components/responses/ErrorForbidden'
        '404':
          $ref: '#/components/responses/ErrorNotFound'
  /v1/rooms/{workspaceId}/invite/regenerate:
    post:
      tags: [rooms]
      summary: Regenerate room invite key
      operationId: regenerateRoomInvite
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/WorkspaceId'
      responses:
        '200':
          description: Regenerated invite state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InviteStateResponse'
        '401':
          $ref: '#/components/responses/ErrorUnauthorized'
        '403':
          $ref: '#/components/responses/ErrorForbidden'
        '404':
          $ref: '#/components/responses/ErrorNotFound'
  /v1/workspaces/{workspaceId}/invite/regenerate:
    post:
      tags: [rooms]
      summary: Regenerate room invite key (workspace alias)
      operationId: regenerateWorkspaceInvite
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/WorkspaceId'
      responses:
        '200':
          description: Regenerated invite state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InviteStateResponse'
        '401':
          $ref: '#/components/responses/ErrorUnauthorized'
        '403':
          $ref: '#/components/responses/ErrorForbidden'
        '404':
          $ref: '#/components/responses/ErrorNotFound'
  /v1/workspaces/{workspaceId}/tree:
    get:
      tags: [tree]
      summary: Get room tree snapshot
      operationId: getWorkspaceTree
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/WorkspaceId'
      responses:
        '200':
          description: Tree snapshot
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TreeSnapshotResponse'
        '401':
          $ref: '#/components/responses/ErrorUnauthorized'
        '403':
          $ref: '#/components/responses/ErrorForbidden'
        '404':
          $ref: '#/components/responses/ErrorNotFound'
  /v1/workspaces/{workspaceId}/ops/batch:
    post:
      tags: [tree]
      summary: Apply file tree operations
      operationId: applyTreeOperations
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/WorkspaceId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BatchOperationsRequest'
      responses:
        '200':
          description: Operation results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BatchOperationsResponse'
        '401':
          $ref: '#/components/responses/ErrorUnauthorized'
        '403':
          $ref: '#/components/responses/ErrorForbidden'
        '404':
          $ref: '#/components/responses/ErrorNotFound'
        '409':
          description: At least one operation conflicted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BatchOperationsResponse'
  /v1/workspaces/{workspaceId}/events:
    get:
      tags: [tree]
      summary: Subscribe to room events
      operationId: streamWorkspaceEvents
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/WorkspaceId'
        - name: cursor
          in: query
          required: false
          schema:
            type: integer
            minimum: 0
          description: Resume event stream from the next sequence after this cursor.
      responses:
        '200':
          description: Server-sent event stream
          content:
            text/event-stream:
              schema:
                type: string
                example: |
                  id: 185
                  event: tree.entry.updated
                  data: {"entryId":"fil_01","path":"Algebra/Week-01.md","entryVersion":6}
        '401':
          $ref: '#/components/responses/ErrorUnauthorized'
        '403':
          $ref: '#/components/responses/ErrorForbidden'
        '404':
          $ref: '#/components/responses/ErrorNotFound'
  /v1/workspaces/{workspaceId}/markdown/bootstrap:
    post:
      tags: [files]
      summary: Bootstrap stored Yjs state for markdown files in a room
      operationId: bootstrapMarkdownDocuments
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/WorkspaceId'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MarkdownBootstrapRequest'
      responses:
        '200':
          description: Current stored Yjs state for requested markdown files
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MarkdownBootstrapResponse'
        '401':
          $ref: '#/components/responses/ErrorUnauthorized'
        '403':
          $ref: '#/components/responses/ErrorForbidden'
        '404':
          $ref: '#/components/responses/ErrorNotFound'
  /v1/files/{entryId}/crdt-token:
    post:
      tags: [files]
      summary: Create short-lived CRDT token for markdown file
      operationId: createCrdtToken
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/EntryId'
      responses:
        '200':
          description: CRDT session bootstrap
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CrdtTokenResponse'
        '401':
          $ref: '#/components/responses/ErrorUnauthorized'
        '403':
          $ref: '#/components/responses/ErrorForbidden'
        '404':
          $ref: '#/components/responses/ErrorNotFound'
  /v1/files/{entryId}/drawing-token:
    post:
      tags: [files, drawings]
      summary: Create short-lived drawing token for Excalidraw live session
      operationId: createDrawingToken
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/EntryId'
      responses:
        '200':
          description: Drawing session bootstrap
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DrawingTokenResponse'
        '401':
          $ref: '#/components/responses/ErrorUnauthorized'
        '403':
          $ref: '#/components/responses/ErrorForbidden'
        '404':
          $ref: '#/components/responses/ErrorNotFound'
  /v1/files/{entryId}/blob/upload-ticket:
    post:
      tags: [files]
      summary: Create upload ticket for blob-backed file revision
      operationId: createBlobUploadTicket
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/EntryId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BlobUploadTicketRequest'
      responses:
        '200':
          description: Upload ticket
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BlobUploadTicketResponse'
        '401':
          $ref: '#/components/responses/ErrorUnauthorized'
        '403':
          $ref: '#/components/responses/ErrorForbidden'
        '404':
          $ref: '#/components/responses/ErrorNotFound'
  /v1/files/{entryId}/blob/download-ticket:
    post:
      tags: [files]
      summary: Create download ticket for current blob-backed file revision
      operationId: createBlobDownloadTicket
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/EntryId'
      responses:
        '200':
          description: Download ticket
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BlobDownloadTicketResponse'
        '401':
          $ref: '#/components/responses/ErrorUnauthorized'
        '403':
          $ref: '#/components/responses/ErrorForbidden'
        '404':
          $ref: '#/components/responses/ErrorNotFound'
  /v1/files/{entryId}/blob/content:
    get:
      tags: [files]
      summary: Download current binary file revision through the authenticated API
      operationId: downloadBlobContent
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/EntryId'
        - name: Range
          in: header
          required: false
          schema:
            type: string
          description: Optional HTTP byte range, for example `bytes=1048576-`.
      responses:
        '200':
          description: Full blob payload
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        '206':
          description: Partial blob payload
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        '401':
          $ref: '#/components/responses/ErrorUnauthorized'
        '403':
          $ref: '#/components/responses/ErrorForbidden'
        '404':
          $ref: '#/components/responses/ErrorNotFound'
        '416':
          $ref: '#/components/responses/ErrorRangeNotSatisfiable'
  /v1/files/{entryId}/blob/uploads/{uploadId}:
    delete:
      tags: [files]
      summary: Cancel pending or active binary blob upload
      operationId: cancelBlobUpload
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/EntryId'
        - name: uploadId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Upload canceled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CancelBlobUploadResponse'
        '401':
          $ref: '#/components/responses/ErrorUnauthorized'
        '403':
          $ref: '#/components/responses/ErrorForbidden'
        '404':
          $ref: '#/components/responses/ErrorNotFound'
  /v1/files/{entryId}/blob/uploads/{uploadId}/content:
    put:
      tags: [files]
      summary: Upload binary blob bytes through the authenticated API
      operationId: uploadBlobContent
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/EntryId'
        - name: uploadId
          in: path
          required: true
          schema:
            type: string
        - name: Content-Range
          in: header
          required: false
          schema:
            type: string
          description: >
            Optional byte range for resumable upload append. Expected form:
            `bytes start-end/total`.
      requestBody:
        required: true
        content:
          application/octet-stream:
            schema:
              type: string
              format: binary
      responses:
        '200':
          description: Blob bytes uploaded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BlobUploadContentResponse'
        '400':
          $ref: '#/components/responses/ErrorBadRequest'
        '409':
          $ref: '#/components/responses/ErrorConflict'
        '401':
          $ref: '#/components/responses/ErrorUnauthorized'
        '403':
          $ref: '#/components/responses/ErrorForbidden'
        '404':
          $ref: '#/components/responses/ErrorNotFound'
  /v1/drawings/{entryId}/lease/acquire:
    post:
      tags: [drawings]
      summary: Acquire the active editor lease for an Excalidraw drawing
      operationId: acquireDrawingLease
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/EntryId'
      responses:
        '200':
          description: Active editor lease
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DrawingLeaseResponse'
        '401':
          $ref: '#/components/responses/ErrorUnauthorized'
        '403':
          $ref: '#/components/responses/ErrorForbidden'
        '404':
          $ref: '#/components/responses/ErrorNotFound'
        '409':
          $ref: '#/components/responses/ErrorConflict'
  /v1/drawings/{entryId}/lease/release:
    post:
      tags: [drawings]
      summary: Release the active editor lease for an Excalidraw drawing
      operationId: releaseDrawingLease
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/EntryId'
      responses:
        '200':
          description: Lease released
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DrawingLeaseResponse'
        '401':
          $ref: '#/components/responses/ErrorUnauthorized'
        '403':
          $ref: '#/components/responses/ErrorForbidden'
        '404':
          $ref: '#/components/responses/ErrorNotFound'
  /v1/drawings/{entryId}/control-requests:
    post:
      tags: [drawings]
      summary: Request control of an actively edited Excalidraw drawing
      operationId: requestDrawingControl
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/EntryId'
      responses:
        '201':
          description: Control request created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DrawingControlRequestResponse'
        '401':
          $ref: '#/components/responses/ErrorUnauthorized'
        '403':
          $ref: '#/components/responses/ErrorForbidden'
        '404':
          $ref: '#/components/responses/ErrorNotFound'
        '409':
          $ref: '#/components/responses/ErrorConflict'
  /v1/drawings/{entryId}/control-requests/{requestId}/approve:
    post:
      tags: [drawings]
      summary: Approve and transfer drawing edit control to the requester
      operationId: approveDrawingControlRequest
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/EntryId'
        - $ref: '#/components/parameters/RequestId'
      responses:
        '200':
          description: Control request approved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DrawingControlResolutionResponse'
        '401':
          $ref: '#/components/responses/ErrorUnauthorized'
        '403':
          $ref: '#/components/responses/ErrorForbidden'
        '404':
          $ref: '#/components/responses/ErrorNotFound'
  /v1/drawings/{entryId}/control-requests/{requestId}/deny:
    post:
      tags: [drawings]
      summary: Deny a pending drawing control request
      operationId: denyDrawingControlRequest
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/EntryId'
        - $ref: '#/components/parameters/RequestId'
      responses:
        '200':
          description: Control request denied
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DrawingControlResolutionResponse'
        '401':
          $ref: '#/components/responses/ErrorUnauthorized'
        '403':
          $ref: '#/components/responses/ErrorForbidden'
        '404':
          $ref: '#/components/responses/ErrorNotFound'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: opaque
  parameters:
    WorkspaceId:
      name: workspaceId
      in: path
      required: true
      schema:
        type: string
      description: Room identifier.
    UserId:
      name: userId
      in: path
      required: true
      schema:
        type: string
      description: Managed user identifier.
    EntryId:
      name: entryId
      in: path
      required: true
      schema:
        type: string
      description: Stable file entry identifier.
    RequestId:
      name: requestId
      in: path
      required: true
      schema:
        type: string
      description: Drawing control request identifier.
  responses:
    ErrorBadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    ErrorUnauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    ErrorForbidden:
      description: Forbidden
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    ErrorNotFound:
      description: Not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    ErrorConflict:
      description: Conflict
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    ErrorRangeNotSatisfiable:
      description: Requested range is not satisfiable
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
  schemas:
    LoginRequest:
      type: object
      additionalProperties: false
      required: [username, password, deviceName]
      properties:
        username:
          type: string
        password:
          type: string
          format: password
        deviceName:
          type: string
    LoginResponse:
      type: object
      additionalProperties: false
      required: [accessToken, refreshToken, user]
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
        user:
          $ref: '#/components/schemas/User'
    RefreshRequest:
      type: object
      additionalProperties: false
      required: [refreshToken]
      properties:
        refreshToken:
          type: string
    RefreshResponse:
      type: object
      additionalProperties: false
      required: [accessToken, refreshToken]
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
    UpdateProfileRequest:
      type: object
      additionalProperties: false
      required: [displayName]
      properties:
        displayName:
          type: string
    ChangePasswordRequest:
      type: object
      additionalProperties: false
      required: [currentPassword, newPassword]
      properties:
        currentPassword:
          type: string
          format: password
        newPassword:
          type: string
          format: password
    SettingsEvent:
      type: object
      additionalProperties: false
      required: [eventId, type, occurredAt, scope, payload]
      properties:
        eventId:
          type: integer
          minimum: 0
        type:
          type: string
          examples:
            - stream.ready
            - auth.me.updated
            - room.created
            - room.updated
            - room.deleted
            - room.members.updated
            - room.membership.changed
            - room.invite.updated
            - room.publication.updated
            - admin.user.created
            - admin.user.updated
            - admin.user.deleted
            - admin.room.members.updated
        occurredAt:
          type: string
          format: date-time
        scope:
          type: string
          enum:
            - settings.stream
            - auth.me
            - rooms
            - room.members
            - room.invite
            - room.publication
            - admin.users
            - admin.rooms
            - admin.room.members
        payload:
          type: object
          additionalProperties: true
    CreateManagedUserRequest:
      type: object
      additionalProperties: false
      required: [username, password]
      properties:
        username:
          type: string
        password:
          type: string
          format: password
        displayName:
          type: string
        globalRole:
          $ref: '#/components/schemas/ManagedGlobalRole'
    GlobalRole:
      type: string
      enum: [admin, writer, reader]
    ManagedGlobalRole:
      type: string
      enum: [writer, reader]
    WorkspaceRole:
      type: string
      enum: [owner, member]
    User:
      type: object
      additionalProperties: false
      required: [id, username, displayName, isAdmin, globalRole]
      properties:
        id:
          type: string
        username:
          type: string
        displayName:
          type: string
        isAdmin:
          type: boolean
        globalRole:
          $ref: '#/components/schemas/GlobalRole'
    ManagedUser:
      allOf:
        - $ref: '#/components/schemas/User'
        - type: object
          additionalProperties: false
          properties:
            createdAt:
              type: string
              format: date-time
            disabledAt:
              type: string
              format: date-time
    UserResponse:
      type: object
      additionalProperties: false
      required: [user]
      properties:
        user:
          $ref: '#/components/schemas/User'
    ManagedUserResponse:
      type: object
      additionalProperties: false
      required: [user]
      properties:
        user:
          $ref: '#/components/schemas/ManagedUser'
    UserListResponse:
      type: object
      additionalProperties: false
      required: [users]
      properties:
        users:
          type: array
          items:
            $ref: '#/components/schemas/ManagedUser'
    Workspace:
      type: object
      additionalProperties: false
      required: [id, name]
      properties:
        id:
          type: string
        name:
          type: string
    WorkspacePublication:
      type: object
      additionalProperties: false
      required: [enabled, updatedAt]
      properties:
        enabled:
          type: boolean
        updatedAt:
          type: string
          format: date-time
    RoomPublication:
      type: object
      additionalProperties: false
      required: [workspaceId, enabled, updatedAt]
      properties:
        workspaceId:
          type: string
        enabled:
          type: boolean
        updatedAt:
          type: string
          format: date-time
    RoomPublicationResponse:
      type: object
      additionalProperties: false
      required: [publication]
      properties:
        publication:
          $ref: '#/components/schemas/RoomPublication'
    UpdateRoomPublicationRequest:
      type: object
      additionalProperties: false
      required: [enabled]
      properties:
        enabled:
          type: boolean
    WorkspaceResponse:
      type: object
      additionalProperties: false
      required: [workspace]
      properties:
        workspace:
          $ref: '#/components/schemas/Workspace'
    CreateRoomRequest:
      type: object
      additionalProperties: false
      required: [name]
      properties:
        name:
          type: string
          minLength: 1
        slug:
          type: string
          deprecated: true
    RoomListItem:
      type: object
      additionalProperties: false
      required: [workspace, membershipRole, createdAt, memberCount, inviteEnabled, publication]
      properties:
        workspace:
          $ref: '#/components/schemas/Workspace'
        membershipRole:
          $ref: '#/components/schemas/WorkspaceRole'
        createdAt:
          type: string
          format: date-time
        memberCount:
          type: integer
          minimum: 0
        inviteEnabled:
          type: boolean
        publication:
          $ref: '#/components/schemas/WorkspacePublication'
    AdminRoomListItem:
      allOf:
        - $ref: '#/components/schemas/RoomListItem'
        - type: object
          additionalProperties: false
          required: [ownerCount]
          properties:
            ownerCount:
              type: integer
              minimum: 0
    RoomListResponse:
      type: object
      additionalProperties: false
      required: [workspaces]
      properties:
        workspaces:
          type: array
          items:
            $ref: '#/components/schemas/RoomListItem'
    AdminRoomListResponse:
      type: object
      additionalProperties: false
      required: [workspaces]
      properties:
        workspaces:
          type: array
          items:
            $ref: '#/components/schemas/AdminRoomListItem'
    JoinRoomRequest:
      type: object
      additionalProperties: false
      required: [code]
      properties:
        code:
          type: string
    InviteState:
      type: object
      additionalProperties: false
      required: [workspaceId, code, enabled, updatedAt]
      properties:
        workspaceId:
          type: string
        code:
          type: string
        enabled:
          type: boolean
        updatedAt:
          type: string
          format: date-time
    InviteStateResponse:
      type: object
      additionalProperties: false
      required: [invite]
      properties:
        invite:
          $ref: '#/components/schemas/InviteState'
    UpdateInviteStateRequest:
      type: object
      additionalProperties: false
      required: [enabled]
      properties:
        enabled:
          type: boolean
    RoomMember:
      type: object
      additionalProperties: false
      required: [user, role, joinedAt]
      properties:
        user:
          $ref: '#/components/schemas/User'
        role:
          $ref: '#/components/schemas/WorkspaceRole'
        joinedAt:
          type: string
          format: date-time
    RoomMemberListResponse:
      type: object
      additionalProperties: false
      required: [members]
      properties:
        members:
          type: array
          items:
            $ref: '#/components/schemas/RoomMember'
    NotePresenceViewer:
      type: object
      additionalProperties: false
      required: [presenceId, sessionId, userId, displayName, color, hasSelection]
      properties:
        presenceId:
          type: string
        sessionId:
          type: string
          description: Awareness session identifier when provided by the client, otherwise a server-synthesized legacy fallback for older clients.
        userId:
          type: string
        displayName:
          type: string
        color:
          type: string
          nullable: true
        hasSelection:
          type: boolean
    NotePresenceNote:
      type: object
      additionalProperties: false
      required: [entryId, viewers]
      properties:
