          format: date-time
    DrawingStateSummary:
      type: object
      additionalProperties: false
      required: [lease, pendingControlRequest, latestScene, pointerActive]
      properties:
        lease:
          oneOf:
            - $ref: '#/components/schemas/DrawingLease'
            - type: 'null'
        pendingControlRequest:
          oneOf:
            - $ref: '#/components/schemas/DrawingControlRequest'
            - type: 'null'
        latestScene:
          oneOf:
            - type: object
              additionalProperties: false
              required: [revision, updatedAt]
              properties:
                revision:
                  type: integer
                  minimum: 0
                updatedAt:
                  type: string
                  format: date-time
            - type: 'null'
        pointerActive:
          type: boolean
    DrawingTokenResponse:
      type: object
      additionalProperties: false
      required: [entryId, workspaceId, provider, wsUrl, token, expiresAt, state]
      properties:
        entryId:
          type: string
        workspaceId:
          type: string
        provider:
          type: string
          example: rolay-excalidraw-live
        wsUrl:
          type: string
          format: uri
        token:
          type: string
        expiresAt:
          type: string
          format: date-time
        state:
          $ref: '#/components/schemas/DrawingStateSummary'
    DrawingLeaseResponse:
      type: object
      additionalProperties: false
      required: [lease]
      properties:
        lease:
          oneOf:
            - $ref: '#/components/schemas/DrawingLease'
            - type: 'null'
    DrawingControlRequestResponse:
      type: object
      additionalProperties: false
      required: [request]
      properties:
        request:
          $ref: '#/components/schemas/DrawingControlRequest'
    DrawingControlResolutionResponse:
      type: object
      additionalProperties: false
      required: [requestId, status, lease]
      properties:
        requestId:
          type: string
        status:
          type: string
          enum: [approved, denied, canceled]
        lease:
          oneOf:
            - $ref: '#/components/schemas/DrawingLease'
            - type: 'null'
    MarkdownBootstrapRequest:
      type: object
      additionalProperties: false
      properties:
        entryIds:
          type: array
          items:
            type: string
          description: >
            Optional list of markdown entry IDs to bootstrap. When omitted,
            the server returns all active markdown entries in the room.
        includeState:
          type: boolean
          default: true
          description: >
            When false, the server returns only per-document size metadata
            and omits the base64-encoded state payloads.
    MarkdownBootstrapDocument:
      type: object
      additionalProperties: false
      required: [entryId, docId, stateBytes, encodedBytes]
      properties:
        entryId:
          type: string
        docId:
          type: string
        stateBytes:
          type: integer
          minimum: 0
          description: Byte size of the raw Yjs state update.
        encodedBytes:
          type: integer
          minimum: 0
          description: Byte size of the base64-encoded state payload.
        state:
          type: string
          description: Base64-encoded full Yjs state update for the document.
    MarkdownBootstrapResponse:
      type: object
      additionalProperties: false
      required:
        - workspaceId
        - encoding
        - includesState
        - documentCount
        - totalStateBytes
        - totalEncodedBytes
        - documents
      properties:
        workspaceId:
          type: string
        encoding:
          type: string
          enum: [base64]
        includesState:
          type: boolean
        documentCount:
          type: integer
          minimum: 0
        totalStateBytes:
          type: integer
          minimum: 0
        totalEncodedBytes:
          type: integer
          minimum: 0
        documents:
          type: array
          items:
            $ref: '#/components/schemas/MarkdownBootstrapDocument'
    BlobUploadTicketRequest:
      type: object
      additionalProperties: false
      required: [hash, sizeBytes, mimeType]
      properties:
        hash:
          type: string
          description: SHA-256 digest in `sha256:<digest>` form. The digest may be hex or base64; the server normalizes accepted values to canonical base64 in responses.
        sizeBytes:
          type: integer
          minimum: 0
        mimeType:
          type: string
    BlobUploadTicketResponse:
      type: object
      additionalProperties: false
      required: [alreadyExists]
      properties:
        alreadyExists:
          type: boolean
        uploadId:
          type: string
        hash:
          type: string
          description: Canonical `sha256:<base64>` digest for the uploaded blob.
        sizeBytes:
          type: integer
          minimum: 0
        mimeType:
          type: string
        uploadedBytes:
          type: integer
          minimum: 0
          description: Number of bytes already staged for this upload session.
        status:
          type: string
          enum: [pending, uploading, ready, expired]
        expiresAt:
          type: string
          format: date-time
        upload:
          $ref: '#/components/schemas/UploadTarget'
        cancel:
          $ref: '#/components/schemas/DeleteTarget'
    UploadTarget:
      type: object
      additionalProperties: false
      required: [method, url, headers]
      properties:
        method:
          type: string
          enum: [PUT, POST]
        url:
          type: string
          format: uri
        headers:
          type: object
          additionalProperties:
            type: string
    DeleteTarget:
      type: object
      additionalProperties: false
      required: [method, url]
      properties:
        method:
          type: string
          enum: [DELETE]
        url:
          type: string
          format: uri
    BlobDownloadTicketResponse:
      type: object
      additionalProperties: false
      required: [hash, sizeBytes, mimeType, url, contentUrl, rangeSupported]
      properties:
        hash:
          type: string
          description: Canonical `sha256:<base64>` digest for the current blob revision.
        sizeBytes:
          type: integer
          minimum: 0
        mimeType:
          type: string
        url:
          type: string
          format: uri
        contentUrl:
          type: string
          format: uri
        rangeSupported:
          type: boolean
    CancelBlobUploadResponse:
      type: object
      additionalProperties: false
      required: [ok, uploadId, wasActive]
      properties:
        ok:
          type: boolean
        uploadId:
          type: string
        wasActive:
          type: boolean
    BlobUploadContentResponse:
      type: object
      additionalProperties: false
      required: [ok, uploadId, receivedBytes, uploadedBytes, sizeBytes, complete]
      properties:
        ok:
          type: boolean
        uploadId:
          type: string
        receivedBytes:
          type: integer
          minimum: 0
          description: Total accepted byte count after this request.
        uploadedBytes:
          type: integer
          minimum: 0
          description: Alias of `receivedBytes` for client progress bookkeeping.
        complete:
          type: boolean
        hash:
          type: string
          description: Canonical `sha256:<base64>` digest for the uploaded blob when the upload reaches completion.
        sizeBytes:
          type: integer
          minimum: 0
    ErrorResponse:
      type: object
      additionalProperties: false
      required: [error]
      properties:
        error:
          $ref: '#/components/schemas/ErrorObject'
    ErrorObject:
      type: object
      additionalProperties: false
      required: [code, message]
      properties:
        code:
          type: string
          examples:
            - unauthorized
            - forbidden
            - workspace_not_found
            - invite_not_found
            - invite_disabled
            - user_not_found
            - entry_not_found
            - path_already_exists
            - entry_version_mismatch
            - username_taken
            - invalid_role
            - cannot_delete_admin_user
        message:
          type: string
        details:
          type: object
          additionalProperties: true
